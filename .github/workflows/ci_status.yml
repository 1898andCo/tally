name: CI Status

on:
  push:
    branches: [develop, main, "release/**", "hotfix/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      doc_only: ${{ steps.check.outputs.doc_only }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          CODE_CHANGES=$(echo "$CHANGED" | grep -v -E '\.md$|^docs/|^LICENSE$|^\.gitignore$|^\.gitattributes$' || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "doc_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "doc_only=false" >> "$GITHUB_OUTPUT"
          fi

  fmt-status:
    name: Rustfmt
    needs: detect
    if: needs.detect.outputs.doc_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - run: echo "Skipped — doc-only change"

  clippy-status:
    name: Clippy
    needs: detect
    if: needs.detect.outputs.doc_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - run: echo "Skipped — doc-only change"

  build-status:
    name: Build
    needs: detect
    if: needs.detect.outputs.doc_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - run: echo "Skipped — doc-only change"

  test-status:
    name: Test
    needs: detect
    if: needs.detect.outputs.doc_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - run: echo "Skipped — doc-only change"

  deny-status:
    name: Cargo Deny
    needs: detect
    if: needs.detect.outputs.doc_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - run: echo "Skipped — doc-only change"
